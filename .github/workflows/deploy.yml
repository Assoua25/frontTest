name: CD - Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            
            echo "📦 Starting deployment to production..."
            
            cd /home/deploy/student-data-app
            
            # Pull le dernier code depuis main
            echo "📥 Pulling latest code from main..."
            git fetch origin
            git checkout main
            git pull origin main
            
            # Installer les dépendances
            echo "📦 Installing dependencies..."
            pnpm install --frozen-lockfile
            
            # Build
            echo "🔨 Building application..."
            pnpm run build
            
            # Redémarrer le service avec PM2
            echo "🔄 Restarting application..."
            pm2 restart student-data-app || pm2 start --name student-data-app "pnpm start"
            
            # Vérifier le status
            pm2 status
            
            echo "✅ Deployment successful!"
      
      - name: ❌ Deployment failed
        if: failure()
        run: echo "Deployment failed! Check VPS logs for details."